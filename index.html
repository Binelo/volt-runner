<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOLT RUNNER — Incremental</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0b0417;
    --magenta:#ff2e97;
    --cyan:#00f0ff;
    --gold:#ffd23f;
    --green:#00ff9f;
    --ink:#f4f0ff;
    --panel:#140a2b;
    --panel2:#1d1040;
    --dim:#6b5b8f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background: radial-gradient(circle at 50% 0%, #1a0836 0%, var(--bg) 55%, #050109 100%);
    color:var(--ink);
    font-family:'Press Start 2P', monospace;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; gap:14px; padding:16px; overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  #stage{
    position:relative;
    width:min(94vw, 88vh*1.7778, 960px);
    aspect-ratio:16/9;
    border:3px solid #2a1650; border-radius:6px;
    box-shadow: 0 0 0 3px #0a0316, 0 0 40px rgba(255,46,151,.25),
      0 0 90px rgba(0,240,255,.18), inset 0 0 60px rgba(0,0,0,.6);
    background:#050109; overflow:hidden;
  }
  canvas{
    display:block; width:100%; height:100%;
    image-rendering:pixelated; image-rendering:crisp-edges; touch-action:none;
  }
  .cap{
    font-size:9px; letter-spacing:1px; color:var(--dim); text-align:center;
    line-height:1.8; max-width:720px;
  }
  .cap b{color:var(--cyan)} .cap i{color:var(--magenta);font-style:normal}
  @media (max-width:520px){ .cap{font-size:7px} }

  /* ---------- DOM UI over canvas ---------- */
  #ui{ position:absolute; inset:0; pointer-events:none; }
  #topbar{
    position:absolute; top:6px; left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:8px;
    pointer-events:none;
  }
  .res{
    font-size:9px; padding:5px 8px; background:rgba(11,4,23,.75);
    border:1px solid #2a1650; border-radius:4px; pointer-events:none;
  }
  .res.volts{ color:var(--gold); }
  .res.chips{ color:var(--cyan); }
  .btn{
    pointer-events:auto; cursor:pointer;
    font-family:inherit; font-size:9px; color:var(--ink);
    background:var(--panel2); border:1px solid #7a3bd6; border-radius:4px;
    padding:6px 9px; text-transform:uppercase; letter-spacing:1px;
    box-shadow:0 0 8px rgba(122,59,214,.35);
  }
  .btn:hover{ background:#2a1650; }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn.gold{ border-color:var(--gold); color:var(--gold); box-shadow:0 0 8px rgba(255,210,63,.3); }
  .btn.mag{ border-color:var(--magenta); color:var(--magenta); }
  .btn.cy{ border-color:var(--cyan); color:var(--cyan); }
  #menubtns{
    position:absolute; bottom:10px; left:0; right:0;
    display:flex; justify-content:center; gap:10px;
  }

  /* ability bar (during play) */
  #abilbar{
    position:absolute; bottom:8px; left:0; right:0;
    display:none; justify-content:center; gap:10px;
  }
  .abtn{
    pointer-events:auto; position:relative; width:56px; height:44px;
    font-family:inherit; font-size:7px; color:var(--ink); cursor:pointer;
    background:rgba(20,10,43,.85); border:1px solid var(--cyan); border-radius:4px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    overflow:hidden;
  }
  .abtn .k{ color:var(--gold); font-size:8px; }
  .abtn .cdmask{
    position:absolute; left:0; bottom:0; right:0; background:rgba(0,0,0,.72);
    height:0%; pointer-events:none;
  }
  .abtn.ready{ box-shadow:0 0 10px rgba(0,240,255,.5); }
  .abtn.active{ border-color:var(--green); box-shadow:0 0 12px rgba(0,255,159,.6); }

  /* modal */
  #modal{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(5,1,9,.8); pointer-events:auto; z-index:20;
  }
  #panel{
    width:min(92%, 700px); max-height:92%; overflow:hidden auto;
    background:var(--panel); border:2px solid #7a3bd6; border-radius:6px;
    box-shadow:0 0 30px rgba(122,59,214,.4); padding:12px;
  }
  #tabs{ display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .tab{
    font-family:inherit; font-size:8px; padding:6px 8px; cursor:pointer;
    background:transparent; color:var(--dim); border:1px solid #2a1650; border-radius:4px;
  }
  .tab.on{ color:var(--cyan); border-color:var(--cyan); }
  #tabbody{ font-size:8px; line-height:1.7; }
  .item{
    display:flex; align-items:center; gap:10px; padding:8px;
    border:1px solid #2a1650; border-radius:4px; margin-bottom:6px; background:var(--panel2);
  }
  .item .info{ flex:1; }
  .item .nm{ color:var(--cyan); font-size:9px; margin-bottom:4px; }
  .item .nm .lv{ color:var(--gold); }
  .item .ds{ color:var(--dim); font-size:7px; line-height:1.6; }
  .item .ds b{ color:var(--green); }
  .buy{
    font-family:inherit; font-size:8px; padding:8px 6px; min-width:96px; cursor:pointer;
    background:#0a0316; color:var(--gold); border:1px solid var(--gold); border-radius:4px;
  }
  .buy:disabled{ opacity:.35; cursor:default; }
  .buy.max{ color:var(--green); border-color:var(--green); }
  input.inp{
    font-family:inherit; font-size:9px; width:100%; padding:8px;
    background:#0a0316; border:1px solid #2a1650; color:var(--ink); border-radius:4px;
    margin-bottom:8px;
  }
  #toast{
    position:absolute; top:34px; left:0; right:0; display:flex; flex-direction:column;
    align-items:center; gap:4px; pointer-events:none; z-index:30;
  }
  .tmsg{
    font-size:8px; color:var(--green); background:rgba(11,4,23,.85);
    border:1px solid var(--green); border-radius:4px; padding:6px 10px;
    animation:tfade 3.2s forwards;
  }
  .tmsg.warn{ color:var(--gold); border-color:var(--gold); }
  @keyframes tfade{ 0%{opacity:0; transform:translateY(-6px)} 10%{opacity:1; transform:none} 80%{opacity:1} 100%{opacity:0} }
  .hr{ border:0; border-top:1px solid #2a1650; margin:10px 0; }
  .small{ font-size:7px; color:var(--dim); line-height:1.8; }
  .small a{ color:var(--cyan); }
  h3.sec{ font-size:9px; color:var(--magenta); margin:8px 0; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="480" height="270"></canvas>
    <div id="ui">
      <div id="topbar">
        <span class="res volts" id="rVolts">⚡ 0</span>
        <span class="res chips" id="rChips">▣ 0</span>
      </div>
      <div id="menubtns">
        <button class="btn gold" id="bShop">Loja</button>
        <button class="btn cy" id="bAbil">Habilidades</button>
        <button class="btn mag" id="bPrest">Overclock</button>
        <button class="btn" id="bAcct">Conta</button>
      </div>
      <div id="abilbar">
        <button class="abtn" id="abShield"><span class="k">1</span>ESCUDO<div class="cdmask"></div></button>
        <button class="abtn" id="abMagnet"><span class="k">2</span>ÍMÃ<div class="cdmask"></div></button>
        <button class="abtn" id="abEmp"><span class="k">3</span>EMP<div class="cdmask"></div></button>
      </div>
      <div id="toast"></div>
      <div id="modal">
        <div id="panel">
          <div id="tabs">
            <button class="tab" data-t="shop">Melhorias</button>
            <button class="tab" data-t="abil">Habilidades</button>
            <button class="tab" data-t="prest">Overclock</button>
            <button class="tab" data-t="acct">Conta</button>
            <button class="tab" id="bClose" style="margin-left:auto;color:var(--magenta);border-color:var(--magenta)">Fechar [ESC]</button>
          </div>
          <div id="tabbody"></div>
        </div>
      </div>
    </div>
  </div>
  <p class="cap"><b>ESPAÇO</b>/<b>toque</b> inverte a gravidade · <b>1 2 3</b> habilidades · <i>colete volts, compre upgrades</i> · <b>M</b> muta</p>

<script>
(() => {
  'use strict';
  // =====================================================================
  //  CONFIG SUPABASE — preencha com os dados do seu projeto
  //  (Project Settings > API). Veja README.md e supabase-setup.sql
  // =====================================================================
  const SUPABASE_URL = "";        // ex: "https://xxxx.supabase.co"
  const SUPABASE_ANON_KEY = "";   // ex: "eyJhbGciOi..."

  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = cv.width, H = cv.height;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- playfield geometry ----
  const TOP = 30, BOT = 240, S = 14, PX = 76;
  const G = 2650, VMAX = 940;

  const C = {
    bg:'#0b0417', mag:'#ff2e97', cyan:'#00f0ff', gold:'#ffd23f',
    green:'#00ff9f', ink:'#f4f0ff', wall:'#22103f', wallEdge:'#7a3bd6',
    obs:'#ff2e97', obsCore:'#ffb3dd', fire:'#ff5533'
  };

  // =====================================================================
  //  META (progresso persistente) + definições de upgrades/habilidades
  // =====================================================================
  const SAVE_KEY = 'voltrunner_save_v1';

  const UPG = {
    orb:   { nm:'ORBES+',       base:40,  mult:1.55, max:25, ds:l=>`+25%/nv volts por orbe (agora: +${l*25}%)` },
    dyn:   { nm:'DÍNAMO',       base:60,  mult:1.60, max:20, ds:l=>`gera volts por distância (${(l*0.5).toFixed(1)}/100m)` },
    luck:  { nm:'SORTE',        base:90,  mult:1.70, max:12, ds:l=>`+4%/nv chance de orbe bônus (${25+l*4}%)` },
    mag:   { nm:'ÍMÃ PASSIVO',  base:110, mult:1.65, max:12, ds:l=>`raio de coleta ${12+l*3}px` },
    combo: { nm:'NÚCLEO COMBO', base:140, mult:1.80, max:8,  ds:l=>`multiplicador sobe a cada ${Math.max(2,5-Math.floor(l/2))} orbes` },
    chassi:{ nm:'CHASSI',       base:180, mult:1.70, max:10, ds:l=>`-3%/nv aceleração do circuito (${l*3}%)` },
    gen:   { nm:'GERADOR',      base:250, mult:1.90, max:15, ds:l=>`+1 volt/s passivo (${l}/s, funciona offline)` },
  };

  const ABIL = {
    shield:{ nm:'ESCUDO', key:'1', base:350, mult:1.80, max:6,
      cd:l=>Math.max(12, 32-3*(l-1)),
      ds:l=> l===0 ? 'absorve 1 colisão (inclusive firewall). Tecla 1'
                   : `absorve 1 colisão · dura 8s · recarga ${Math.max(12,32-3*(l-1))}s` },
    magnet:{ nm:'SUPER ÍMÃ', key:'2', base:500, mult:1.80, max:6,
      cd:l=>Math.max(10, 24-2*(l-1)), dur:l=>4+l,
      ds:l=> l===0 ? 'atrai todos os orbes da tela por alguns segundos. Tecla 2'
                   : `atrai orbes · duração ${4+l}s · recarga ${Math.max(10,24-2*(l-1))}s` },
    emp:{ nm:'PULSO EMP', key:'3', base:900, mult:1.90, max:5,
      cd:l=>Math.max(20, 45-4*(l-1)),
      ds:l=> l===0 ? 'destrói todos os obstáculos na tela (+volts por alvo). Tecla 3'
                   : `limpa a tela · +2⚡ por alvo · recarga ${Math.max(20,45-4*(l-1))}s` },
  };

  function defaultMeta(){
    return {
      v:1, volts:0, lifetime:0, cycle:0, chips:0, prestiges:0, best:0,
      up:{orb:0,dyn:0,luck:0,mag:0,combo:0,chassi:0,gen:0},
      ab:{shield:0,magnet:0,emp:0},
      lastSeen:Date.now(), muted:false
    };
  }
  let meta = defaultMeta();

  function chipBonus(){ return 1 + meta.chips*0.10; }
  function upCost(k){ const u=UPG[k]; return Math.floor(u.base*Math.pow(u.mult, meta.up[k])); }
  function abCost(k){ const a=ABIL[k]; return Math.floor(a.base*Math.pow(a.mult, meta.ab[k])); }
  function prestReq(){ return 15000*(meta.prestiges+1); }
  function prestGain(){ return Math.max(1, Math.floor(Math.sqrt(meta.cycle/3000))); }

  function gainVolts(n){
    meta.volts += n; meta.lifetime += n; meta.cycle += n;
    uiDirty = true;
  }

  // =====================================================================
  //  SAVE — localStorage sempre + Supabase quando logado
  // =====================================================================
  let sb = null, sbUser = null, syncTimer = null, lastSyncInfo = 'nunca';
  if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase){
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }

  function saveLocal(){
    meta.lastSeen = Date.now();
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify(meta)); }catch(e){}
  }
  function loadLocal(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(raw){ const d = JSON.parse(raw); meta = Object.assign(defaultMeta(), d);
        meta.up = Object.assign(defaultMeta().up, d.up||{});
        meta.ab = Object.assign(defaultMeta().ab, d.ab||{});
      }
    }catch(e){}
  }
  function saveAll(){
    saveLocal();
    if(sb && sbUser){
      clearTimeout(syncTimer);
      syncTimer = setTimeout(pushCloud, 2500);
    }
  }
  async function pushCloud(){
    if(!sb || !sbUser) return;
    try{
      const { error } = await sb.from('saves').upsert(
        { user_id: sbUser.id, data: meta, updated_at: new Date().toISOString() },
        { onConflict: 'user_id' });
      if(error) throw error;
      lastSyncInfo = new Date().toLocaleTimeString();
    }catch(e){ toast('erro ao salvar na nuvem', true); }
  }
  async function pullCloud(){
    if(!sb || !sbUser) return;
    try{
      const { data, error } = await sb.from('saves').select('data').eq('user_id', sbUser.id).maybeSingle();
      if(error) throw error;
      if(data && data.data){
        const remote = data.data;
        if((remote.lifetime||0) >= meta.lifetime){
          meta = Object.assign(defaultMeta(), remote);
          meta.up = Object.assign(defaultMeta().up, remote.up||{});
          meta.ab = Object.assign(defaultMeta().ab, remote.ab||{});
          toast('progresso da nuvem carregado');
        } else {
          toast('progresso local mais avançado — enviado à nuvem');
          pushCloud();
        }
        saveLocal(); uiDirty = true; renderTab();
      } else { pushCloud(); }
    }catch(e){ toast('erro ao ler save da nuvem', true); }
  }

  async function authInit(){
    if(!sb) return;
    const { data } = await sb.auth.getSession();
    if(data && data.session){ sbUser = data.session.user; await pullCloud(); }
    sb.auth.onAuthStateChange((_ev, session)=>{
      sbUser = session ? session.user : null;
      if(curTab==='acct') renderTab();
    });
  }

  // ganhos offline do GERADOR
  function offlineGains(){
    const gen = meta.up.gen;
    if(gen<=0) return;
    const dt = Math.min(8*3600, (Date.now()-meta.lastSeen)/1000);
    if(dt < 60) return;
    const earned = Math.floor(gen * dt * 0.5 * chipBonus());
    if(earned>0){ gainVolts(earned); toast(`gerador offline: +${fmt(earned)} ⚡`); saveLocal(); }
  }

  // =====================================================================
  //  ESTADO DO JOGO
  // =====================================================================
  const MENU=0, PLAY=1, DEAD=2;
  let state = MENU;

  let player, obstacles, orbs, particles, stars, gridOff;
  let speed, distance, score, combo, mult, spawnAcc, spacing;
  let shake, flash, deadTimer, safeLane;
  let runVolts, dynAcc;
  // habilidades em jogo
  let abState;

  function multStep(){ return Math.max(2, 5 - Math.floor(meta.up.combo/2)); }

  function reset(){
    player = { y: BOT - S, vy: 0, dir: 1, trail: [] };
    obstacles = []; orbs = []; particles = [];
    speed = 145; distance = 0; score = 0; combo = 0; mult = 1;
    spawnAcc = 0; spacing = 300; shake = 0; flash = 0; gridOff = 0;
    safeLane = 'floor'; runVolts = 0; dynAcc = 0;
    abState = {
      shield:{ cd:0, active:false, t:0 },
      magnet:{ cd:0, active:false, t:0 },
      emp:{ cd:0 }
    };
    let cx = W + 40;
    for(let i=0;i<4;i++){ spawnChunk(cx); cx += 260; }
  }

  function initStars(){
    stars = [];
    for(let i=0;i<46;i++){
      stars.push({ x: Math.random()*W, y: TOP + Math.random()*(BOT-TOP),
        z: 0.3 + Math.random()*0.9, s: Math.random()<0.5?1:2 });
    }
  }

  // ---- audio ----
  let actx=null;
  function ensureAudio(){
    if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(actx && actx.state==='suspended') actx.resume();
  }
  function blip(freq, dur, type='square', vol=0.14, slideTo=null){
    if(!actx || meta.muted) return;
    const t = actx.currentTime;
    const o = actx.createOscillator(); const g = actx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t+dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g).connect(actx.destination);
    o.start(t); o.stop(t+dur);
  }
  function noiseHit(){
    if(!actx || meta.muted) return;
    const t = actx.currentTime, len = 0.34;
    const buf = actx.createBuffer(1, actx.sampleRate*len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++){ d[i] = (Math.random()*2-1) * (1 - i/d.length); }
    const src = actx.createBufferSource(); src.buffer = buf;
    const f = actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=900;
    const g = actx.createGain(); g.gain.setValueAtTime(0.3,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+len);
    src.connect(f).connect(g).connect(actx.destination); src.start(t);
    blip(220,0.35,'sawtooth',0.12,60);
  }

  // =====================================================================
  //  SPAWN — blocos, drones e firewalls
  // =====================================================================
  function spawnChunk(atX){
    // firewall ocasional (após 1400m): parede total, só passa com escudo/EMP
    if(distance > 1400 && Math.random() < 0.12){
      obstacles.push({ type:'wall', x: atX, w: 6, broken:false });
      // recompensa do outro lado
      for(let i=0;i<3;i++){
        orbs.push({ x: atX + 40 + i*20, y: TOP + 30 + Math.random()*(BOT-TOP-60), r:4, taken:false, bonus: i===1 });
      }
      return;
    }
    const lane = Math.random()<0.5 ? 'floor' : 'ceiling';
    const h = 42 + Math.random()*54;
    const w = 18 + Math.random()*14;
    obstacles.push({ type:'block', x: atX, w, h, lane });

    // drone oscilante (após 700m)
    if(distance > 700 && Math.random() < 0.22){
      const baseY = TOP + 50 + Math.random()*(BOT-TOP-100);
      obstacles.push({ type:'drone', x: atX + 90 + Math.random()*60, y: baseY,
        baseY, amp: 26 + Math.random()*34, ph: Math.random()*6.28 });
    }

    const safe = lane==='floor' ? 'ceiling' : 'floor';
    const oy = safe==='ceiling' ? TOP + 12 : BOT - 12;
    const n = 2 + (Math.random()<0.5?1:0);
    for(let i=0;i<n;i++){
      orbs.push({ x: atX - 30 + i*22, y: oy, r: 4, taken:false });
    }
    const bonusChance = 0.25 + meta.up.luck*0.04;
    if(Math.random() < bonusChance){
      orbs.push({ x: atX + w + 46, y: TOP + 24 + Math.random()*(BOT-TOP-48), r:4, taken:false, bonus:true });
    }
  }

  // =====================================================================
  //  INPUT
  // =====================================================================
  function press(){
    ensureAudio();
    if(modalOpen) return;
    if(state===MENU){ reset(); state=PLAY; uiMode(); return; }
    if(state===DEAD){ if(deadTimer<=0){ reset(); state=PLAY; uiMode(); } return; }
    player.dir *= -1;
    player.vy = 210 * player.dir;
    blip(player.dir<0?520:340, 0.09, 'square', 0.12, player.dir<0?900:220);
    burst(PX+S/2, player.y+S/2, C.cyan, 8, 90);
    shake = Math.min(shake+2.2, 7);
  }
  function toggleMute(){ meta.muted=!meta.muted; saveLocal(); }

  function useAbility(k){
    if(state!==PLAY) return;
    const lvl = meta.ab[k];
    if(lvl<=0) return;
    const st = abState[k];
    if(st.cd>0) return;
    ensureAudio();
    if(k==='shield'){
      st.active = true; st.t = 8;
      st.cd = ABIL.shield.cd(lvl);
      blip(700,0.15,'triangle',0.14,1200);
      burst(PX+S/2, player.y+S/2, C.cyan, 14, 120);
    } else if(k==='magnet'){
      st.active = true; st.t = ABIL.magnet.dur(lvl);
      st.cd = ABIL.magnet.cd(lvl);
      blip(500,0.2,'sine',0.14,900);
    } else if(k==='emp'){
      st.cd = ABIL.emp.cd(lvl);
      let hits = 0;
      for(const o of obstacles){
        if(o.x > W+10) continue;
        if(o.type==='wall' && !o.broken){ o.broken=true; hits++; burst(o.x+3,(TOP+BOT)/2,C.fire,20,160); }
        else if(o.type!=='wall'){ o.dead = true; hits++;
          const oy = o.type==='drone' ? o.y : (o.lane==='floor'?BOT-o.h/2:TOP+o.h/2);
          burst(o.x+ (o.w||12)/2, oy, C.mag, 16, 150);
        }
      }
      obstacles = obstacles.filter(o=>!o.dead);
      if(hits>0){
        const g = Math.ceil(2*hits*chipBonus());
        runVolts += g; score += 10*hits;
        toast(`EMP: ${hits} alvos +${g} ⚡`);
      }
      flash = 0.6; shake = 8;
      blip(180,0.4,'sawtooth',0.16,40);
    }
    uiDirty = true;
  }

  window.addEventListener('keydown', e=>{
    if(e.code==='Escape'){ if(modalOpen) closeModal(); return; }
    if(modalOpen) return;
    if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ e.preventDefault(); press(); }
    else if(e.code==='KeyM'){ toggleMute(); }
    else if(e.code==='Digit1'){ useAbility('shield'); }
    else if(e.code==='Digit2'){ useAbility('magnet'); }
    else if(e.code==='Digit3'){ useAbility('emp'); }
  });
  cv.addEventListener('mousedown', e=>{ handleClick(e.offsetX/cv.clientWidth*W, e.offsetY/cv.clientHeight*H); });
  cv.addEventListener('touchstart', e=>{
    e.preventDefault();
    const r = cv.getBoundingClientRect();
    const t = e.changedTouches[0];
    handleClick((t.clientX-r.left)/r.width*W, (t.clientY-r.top)/r.height*H);
  }, {passive:false});
  function handleClick(cx, cy){
    if(cx > W-30 && cy < 24){ toggleMute(); ensureAudio(); return; }
    press();
  }

  // ---- particles ----
  function burst(x,y,color,count,spd){
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const s = (0.3+Math.random())*spd;
      particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:0.5+Math.random()*0.4, max:0.9, color, size:1+Math.round(Math.random()*2) });
    }
  }
  function aabb(ax,ay,aw,ah,bx,by,bw,bh){
    return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
  }

  function hitOrShield(breaker){
    // retorna true se o escudo absorveu
    if(abState.shield.active){
      abState.shield.active = false;
      burst(PX+S/2, player.y+S/2, C.cyan, 24, 180);
      blip(900,0.2,'triangle',0.15,300);
      shake = 6;
      if(breaker) breaker();
      return true;
    }
    return false;
  }

  function die(){
    state = DEAD;
    deadTimer = 0.55;
    meta.best = Math.max(meta.best, Math.floor(score));
    const earned = Math.max(0, Math.floor(runVolts));
    if(earned>0) gainVolts(earned);
    lastRunVolts = earned;
    shake = 10; flash = 1;
    burst(PX+S/2, player.y+S/2, C.mag, 34, 200);
    burst(PX+S/2, player.y+S/2, C.gold, 18, 130);
    noiseHit();
    saveAll(); if(sb && sbUser){ clearTimeout(syncTimer); pushCloud(); }
    uiMode(); uiDirty = true;
  }
  let lastRunVolts = 0;

  // =====================================================================
  //  UPDATE
  // =====================================================================
  function update(dt){
    if(state===DEAD){
      deadTimer -= dt;
      updateParticles(dt);
      shake *= 0.88; flash *= 0.9;
      gridOff += 30*dt;
      return;
    }
    if(state!==PLAY){
      updateParticles(dt);
      gridOff += 20*dt;
      shake *= 0.85;
      return;
    }

    distance += speed*dt;
    score += speed*dt*0.06;
    const accel = 0.02 * (1 - 0.03*meta.up.chassi);
    speed = Math.min(345, 145 + distance*accel);
    spacing = Math.max(205, 300 - distance*0.006);
    gridOff += speed*dt;

    // dínamo: volts por distância
    if(meta.up.dyn>0){
      dynAcc += speed*dt * (meta.up.dyn*0.005) * chipBonus();
      if(dynAcc>=1){ const g=Math.floor(dynAcc); dynAcc-=g; runVolts += g; }
    }

    // cooldowns/duração de habilidades
    for(const k of ['shield','magnet','emp']){
      const st = abState[k];
      if(st.cd>0) st.cd = Math.max(0, st.cd-dt);
      if(st.active !== undefined && st.active){
        st.t -= dt;
        if(st.t<=0) st.active = false;
      }
    }

    // physics
    player.vy += G*player.dir*dt;
    if(player.vy>VMAX) player.vy=VMAX;
    if(player.vy<-VMAX) player.vy=-VMAX;
    player.y += player.vy*dt;
    if(player.y < TOP){ player.y=TOP; if(player.dir<0) player.vy=0; }
    if(player.y > BOT-S){ player.y=BOT-S; if(player.dir>0) player.vy=0; }

    player.trail.push({x:PX, y:player.y});
    if(player.trail.length>9) player.trail.shift();

    // move world
    const dx = speed*dt;
    for(const o of obstacles){
      o.x -= dx;
      if(o.type==='drone'){ o.ph += dt*2.4; o.y = o.baseY + Math.sin(o.ph)*o.amp; }
    }
    for(const o of orbs) o.x -= dx;
    obstacles = obstacles.filter(o=>o.x+(o.w||14) > -20);
    orbs = orbs.filter(o=>o.x > -20 && !o.taken);

    spawnAcc += dx;
    if(spawnAcc >= spacing){
      spawnAcc -= spacing;
      spawnChunk(W + 30);
    }

    // colisões
    for(const o of obstacles){
      if(o.type==='block'){
        const oy = o.lane==='floor' ? BOT-o.h : TOP;
        if(aabb(PX, player.y, S, S, o.x, oy, o.w, o.h)){
          if(hitOrShield(()=>{ o.dead=true; burst(o.x+o.w/2,oy+o.h/2,C.mag,14,140); })) continue;
          die(); return;
        }
      } else if(o.type==='drone'){
        if(aabb(PX, player.y, S, S, o.x-7, o.y-7, 14, 14)){
          if(hitOrShield(()=>{ o.dead=true; burst(o.x,o.y,C.mag,14,140); })) continue;
          die(); return;
        }
      } else if(o.type==='wall' && !o.broken){
        if(aabb(PX, player.y, S, S, o.x, TOP, o.w, BOT-TOP)){
          if(hitOrShield(()=>{ o.broken=true; const g=Math.ceil(5*chipBonus()); runVolts+=g; toast(`firewall rompido +${g} ⚡`); })) continue;
          die(); return;
        }
      }
    }
    obstacles = obstacles.filter(o=>!o.dead);

    // ímã (passivo + super)
    const magActive = abState.magnet.active;
    const pr = 12 + meta.up.mag*3;
    const pull = magActive ? 200 : pr;
    const cxp = PX+S/2, cyp = player.y+S/2;
    for(const o of orbs){
      if(o.taken) continue;
      const d = Math.hypot(cxp-o.x, cyp-o.y);
      if(magActive && d < pull){
        const f = 8*dt;
        o.x += (cxp-o.x)*f; o.y += (cyp-o.y)*f;
      } else if(!magActive && d < pr && d > 12){
        const f = 5*dt;
        o.x += (cxp-o.x)*f; o.y += (cyp-o.y)*f;
      }
      if(Math.hypot(cxp-o.x, cyp-o.y) < 12){
        o.taken = true;
        combo++;
        mult = 1 + Math.floor(combo/multStep());
        const gain = (o.bonus?60:25)*mult;
        score += gain;
        const vg = (o.bonus?6:2) * (1+0.25*meta.up.orb) * mult * chipBonus();
        runVolts += vg;
        burst(o.x, o.y, o.bonus?C.gold:C.green, o.bonus?14:7, 90);
        blip(o.bonus?900:660 + combo*4, 0.07, 'square', 0.11, (o.bonus?1500:1000));
        if(o.bonus) shake = Math.min(shake+2,6);
      }
    }

    safeLane = player.dir>0 ? 'floor' : 'ceiling';
    updateParticles(dt);
    shake *= 0.86;
    flash *= 0.9;
  }

  function updateParticles(dt){
    for(const p of particles){
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.vy += 140*dt; p.life -= dt;
    }
    particles = particles.filter(p=>p.life>0);
  }

  // =====================================================================
  //  RENDER
  // =====================================================================
  function px(x){ return Math.round(x); }
  function py(y){ return Math.round(y)+0.5; }

  function drawWalls(){
    ctx.fillStyle = C.wall;
    ctx.fillRect(0,0,W,TOP);
    ctx.fillRect(0,BOT,W,H-BOT);
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = C.wallEdge;
    ctx.fillStyle = C.wallEdge;
    ctx.fillRect(0,TOP-2,W,2);
    ctx.fillRect(0,BOT,W,2);
    ctx.restore();
  }

  function drawBackground(){
    ctx.fillStyle = C.bg;
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = 'rgba(122,59,214,0.14)';
    ctx.lineWidth = 1;
    const gap = 40;
    const off = -(gridOff*0.4 % gap);
    ctx.beginPath();
    for(let x=off; x<W; x+=gap){ ctx.moveTo(px(x)+0.5, TOP); ctx.lineTo(px(x)+0.5, BOT); }
    ctx.stroke();
    ctx.strokeStyle = 'rgba(122,59,214,0.08)';
    ctx.beginPath();
    for(let y=TOP+30; y<BOT; y+=34){ ctx.moveTo(0,py(y)); ctx.lineTo(W,py(y)); }
    ctx.stroke();
    for(const s of stars){
      s.x -= (speed||60)*0.006*s.z;
      if(s.x<0){ s.x=W; s.y=TOP+Math.random()*(BOT-TOP); }
      ctx.fillStyle = s.z>0.7 ? 'rgba(0,240,255,'+(0.15+s.z*0.25)+')' : 'rgba(255,46,151,'+(0.12+s.z*0.2)+')';
      ctx.fillRect(px(s.x), px(s.y), s.s, s.s);
    }
  }

  function drawObstacles(t){
    for(const o of obstacles){
      if(o.type==='block'){
        const oy = o.lane==='floor' ? BOT-o.h : TOP;
        ctx.save();
        ctx.shadowBlur = 12; ctx.shadowColor = C.mag;
        ctx.fillStyle = C.obs;
        ctx.fillRect(px(o.x), px(oy), px(o.w), px(o.h));
        ctx.restore();
        ctx.fillStyle = C.obsCore;
        ctx.fillRect(px(o.x)+2, px(oy)+2, 2, px(o.h)-4);
        ctx.fillStyle = 'rgba(11,4,23,0.55)';
        for(let yy=oy+4; yy<oy+o.h-2; yy+=8){
          ctx.fillRect(px(o.x)+4, px(yy), px(o.w)-6, 2);
        }
      } else if(o.type==='drone'){
        ctx.save();
        ctx.shadowBlur = 10; ctx.shadowColor = C.mag;
        ctx.fillStyle = C.mag;
        ctx.beginPath();
        ctx.moveTo(px(o.x), px(o.y-8));
        ctx.lineTo(px(o.x+8), px(o.y));
        ctx.lineTo(px(o.x), px(o.y+8));
        ctx.lineTo(px(o.x-8), px(o.y));
        ctx.closePath(); ctx.fill();
        ctx.restore();
        ctx.fillStyle = C.ink;
        ctx.fillRect(px(o.x)-2, px(o.y)-2, 4, 4);
      } else if(o.type==='wall'){
        if(o.broken){
          // resto da parede quebrada
          ctx.fillStyle = 'rgba(255,85,51,0.15)';
          ctx.fillRect(px(o.x), TOP, o.w, 8);
          ctx.fillRect(px(o.x), BOT-8, o.w, 8);
          continue;
        }
        const fl = 0.75 + Math.sin(t*0.02)*0.25;
        ctx.save();
        ctx.shadowBlur = 14; ctx.shadowColor = C.fire;
        ctx.fillStyle = `rgba(255,85,51,${0.55*fl})`;
        ctx.fillRect(px(o.x), TOP, o.w, BOT-TOP);
        ctx.restore();
        ctx.fillStyle = `rgba(255,210,63,${0.8*fl})`;
        for(let yy=TOP+6; yy<BOT-4; yy+=14){
          ctx.fillRect(px(o.x)+2, yy + (Math.floor(t*0.01)%14), 2, 6);
        }
      }
    }
  }

  function drawOrbs(t){
    for(const o of orbs){
      if(o.taken) continue;
      const pulse = 1 + Math.sin(t*0.008 + o.x*0.1)*0.18;
      const col = o.bonus ? C.gold : C.green;
      ctx.save();
      ctx.shadowBlur = 10; ctx.shadowColor = col;
      ctx.fillStyle = col;
      const r = Math.round(o.r*pulse);
      ctx.fillRect(px(o.x)-r, px(o.y)-1, r*2, 2);
      ctx.fillRect(px(o.x)-1, px(o.y)-r, 2, r*2);
      ctx.fillRect(px(o.x)-2, px(o.y)-2, 4, 4);
      ctx.restore();
    }
  }

  function drawPlayer(t){
    for(let i=0;i<player.trail.length;i++){
      const tp = player.trail[i];
      const a = (i+1)/player.trail.length;
      ctx.fillStyle = `rgba(0,240,255,${a*0.35})`;
      const sz = Math.round(S*a);
      ctx.fillRect(px(tp.x)+(S-sz)/2, px(tp.y)+(S-sz)/2, sz, sz);
    }
    ctx.save();
    ctx.shadowBlur = 14; ctx.shadowColor = C.cyan;
    ctx.fillStyle = C.cyan;
    ctx.fillRect(px(PX), px(player.y), S, S);
    ctx.restore();
    ctx.fillStyle = C.ink;
    ctx.fillRect(px(PX)+3, px(player.y)+3, S-6, S-6);
    ctx.fillStyle = C.cyan;
    ctx.fillRect(px(PX)+5, px(player.y)+5, S-10, S-10);
    // escudo ativo
    if(state===PLAY && abState.shield.active){
      const pl = 2 + Math.sin(t*0.02)*1.5;
      ctx.save();
      ctx.strokeStyle = C.cyan; ctx.lineWidth = 1;
      ctx.shadowBlur = 8; ctx.shadowColor = C.cyan;
      ctx.strokeRect(px(PX)-pl-2, px(player.y)-pl-2, S+2*(pl+2), S+2*(pl+2));
      ctx.restore();
    }
    // super ímã ativo
    if(state===PLAY && abState.magnet.active){
      ctx.save();
      ctx.strokeStyle = 'rgba(0,255,159,0.35)';
      ctx.beginPath();
      ctx.arc(PX+S/2, player.y+S/2, 30+Math.sin(t*0.01)*4, 0, 7);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawParticles(){
    for(const p of particles){
      const a = Math.max(0, p.life/p.max);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.fillRect(px(p.x), px(p.y), p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  function text(str, x, y, size, color, align='left'){
    ctx.font = `${size}px 'Press Start 2P', monospace`;
    ctx.textAlign = align;
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText(str, x+1, y+1);
    ctx.fillStyle = color;
    ctx.fillText(str, x, y);
    ctx.textAlign = 'left';
  }

  function fmt(n){
    n = Math.floor(n);
    if(n>=1e9) return (n/1e9).toFixed(2)+'B';
    if(n>=1e6) return (n/1e6).toFixed(2)+'M';
    if(n>=1e4) return (n/1e3).toFixed(1)+'K';
    return String(n);
  }

  function drawHUD(){
    text('SCORE ' + String(Math.floor(score)).padStart(5,'0'), 8, 4, 8, C.ink);
    if(state===PLAY){
      text('+' + fmt(runVolts) + ' V', 8, 16, 8, C.gold);
      if(combo>=multStep()){
        text('x' + mult + ' COMBO ' + combo, 8, 28, 8, mult>=3?C.gold:C.green);
      }
    }
    text('BEST ' + String(meta.best).padStart(5,'0'), W/2, 4, 8, '#8a76c9', 'center');
    // mute icon
    ctx.fillStyle = meta.muted ? '#5a4a80' : C.cyan;
    ctx.fillRect(W-22, 8, 3, 6);
    ctx.fillRect(W-19, 6, 3, 10);
    if(meta.muted){
      ctx.strokeStyle = C.mag; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(W-14,6); ctx.lineTo(W-8,14); ctx.stroke();
    } else {
      ctx.strokeStyle = C.cyan; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(W-14,11,3,-0.9,0.9); ctx.stroke();
    }
  }

  function drawCRT(t){
    ctx.fillStyle = 'rgba(0,0,0,0.16)';
    for(let y=0;y<H;y+=3){ ctx.fillRect(0,y,W,1); }
    const g = ctx.createRadialGradient(W/2,H/2,H*0.35, W/2,H/2,H*0.85);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(1,'rgba(0,0,0,0.5)');
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    if(!reduceMotion){
      const f = 0.02 + Math.random()*0.03;
      ctx.fillStyle = `rgba(150,120,255,${f*0.3})`;
      ctx.fillRect(0,0,W,H);
    }
    if(flash>0.02){
      ctx.fillStyle = `rgba(255,46,151,${flash*0.5})`;
      ctx.fillRect(0,0,W,H);
    }
  }

  function render(t){
    ctx.save();
    let sx=0, sy=0;
    if(shake>0.1 && !reduceMotion){
      sx = (Math.random()*2-1)*shake;
      sy = (Math.random()*2-1)*shake;
    }
    ctx.translate(Math.round(sx), Math.round(sy));

    drawBackground();
    drawOrbs(t);
    drawObstacles(t);
    if(state!==MENU) drawPlayer(t);
    drawParticles();
    drawWalls();
    ctx.restore();

    drawHUD();

    if(state===MENU){
      const bob = Math.sin(t*0.003)*3;
      ctx.save(); ctx.shadowBlur=16; ctx.shadowColor=C.mag;
      text('VOLT', W/2, 66+bob, 30, C.mag, 'center'); ctx.restore();
      ctx.save(); ctx.shadowBlur=16; ctx.shadowColor=C.cyan;
      text('RUNNER', W/2, 100+bob, 22, C.cyan, 'center'); ctx.restore();
      text('colete volts · compre upgrades', W/2, 138, 8, '#8a76c9', 'center');
      if(meta.chips>0)
        text('OVERCLOCK x' + chipBonus().toFixed(1) + ' (' + meta.chips + ' chips)', W/2, 152, 8, C.gold, 'center');
      if(Math.floor(t/450)%2===0)
        text('ESPACO / TOQUE', W/2, 182, 10, C.gold, 'center');
    }
    if(state===DEAD){
      ctx.fillStyle='rgba(11,4,23,0.55)'; ctx.fillRect(0,0,W,H);
      ctx.save(); ctx.shadowBlur=14; ctx.shadowColor=C.mag;
      text('CIRCUITO ROMPIDO', W/2, 76, 16, C.mag, 'center'); ctx.restore();
      text('SCORE ' + Math.floor(score), W/2, 108, 10, C.ink, 'center');
      text('+' + fmt(lastRunVolts) + ' VOLTS', W/2, 126, 10, C.gold, 'center');
      text('BEST  ' + meta.best, W/2, 144, 10, '#8a76c9', 'center');
      if(Math.floor(score)>=meta.best && Math.floor(score)>0)
        text('NOVO RECORDE!', W/2, 162, 8, C.green, 'center');
      if(deadTimer<=0 && Math.floor(t/450)%2===0)
        text('ESPACO / TOQUE — ou visite a LOJA', W/2, 186, 8, C.cyan, 'center');
    }

    drawCRT(t);
  }

  // =====================================================================
  //  UI DOM — topbar, ability bar, modal
  // =====================================================================
  const $ = s => document.querySelector(s);
  let uiDirty = true, modalOpen = false, curTab = 'shop';
  let prestConfirm = false;

  function toast(msg, warn){
    const el = document.createElement('div');
    el.className = 'tmsg' + (warn?' warn':'');
    el.textContent = msg;
    $('#toast').appendChild(el);
    setTimeout(()=>el.remove(), 3300);
  }

  function uiMode(){
    $('#menubtns').style.display = (state===PLAY) ? 'none' : 'flex';
    const anyAb = meta.ab.shield>0 || meta.ab.magnet>0 || meta.ab.emp>0;
    $('#abilbar').style.display = (state===PLAY && anyAb) ? 'flex' : 'none';
    $('#abShield').style.display = meta.ab.shield>0?'flex':'none';
    $('#abMagnet').style.display = meta.ab.magnet>0?'flex':'none';
    $('#abEmp').style.display = meta.ab.emp>0?'flex':'none';
  }

  function refreshTop(){
    $('#rVolts').textContent = '⚡ ' + fmt(meta.volts);
    $('#rChips').textContent = '▣ ' + meta.chips + (meta.chips>0? ' (+'+Math.round((chipBonus()-1)*100)+'%)':'');
  }

  function refreshAbilBar(){
    if(state!==PLAY) return;
    const map = { shield:'#abShield', magnet:'#abMagnet', emp:'#abEmp' };
    for(const k in map){
      if(meta.ab[k]<=0) continue;
      const el = $(map[k]);
      const st = abState[k];
      const total = ABIL[k].cd(meta.ab[k]);
      const p = st.cd>0 ? (st.cd/total*100) : 0;
      el.querySelector('.cdmask').style.height = p+'%';
      el.classList.toggle('ready', st.cd<=0 && !(st.active));
      el.classList.toggle('active', !!st.active);
    }
  }

  function openModal(tab){
    if(state===PLAY) return;
    curTab = tab; modalOpen = true; prestConfirm = false;
    $('#modal').style.display = 'flex';
    renderTab();
  }
  function closeModal(){
    modalOpen = false;
    $('#modal').style.display = 'none';
  }

  $('#bShop').onclick = ()=>openModal('shop');
  $('#bAbil').onclick = ()=>openModal('abil');
  $('#bPrest').onclick = ()=>openModal('prest');
  $('#bAcct').onclick = ()=>openModal('acct');
  $('#bClose').onclick = closeModal;
  $('#modal').addEventListener('mousedown', e=>{ if(e.target.id==='modal') closeModal(); });
  document.querySelectorAll('.tab[data-t]').forEach(b=>{
    b.onclick = ()=>{ curTab = b.dataset.t; prestConfirm=false; renderTab(); };
  });

  const abBtnEls = { shield:'#abShield', magnet:'#abMagnet', emp:'#abEmp' };
  for(const k in abBtnEls){
    const el = $(abBtnEls[k]);
    el.addEventListener('pointerdown', e=>{ e.preventDefault(); e.stopPropagation(); useAbility(k); });
  }

  function renderTab(){
    document.querySelectorAll('.tab[data-t]').forEach(b=>b.classList.toggle('on', b.dataset.t===curTab));
    const body = $('#tabbody');
    if(curTab==='shop') renderShop(body);
    else if(curTab==='abil') renderAbil(body);
    else if(curTab==='prest') renderPrest(body);
    else renderAcct(body);
  }

  function renderShop(body){
    body.innerHTML = '';
    for(const k in UPG){
      const u = UPG[k], lvl = meta.up[k];
      const maxed = lvl>=u.max;
      const cost = upCost(k);
      const row = document.createElement('div');
      row.className = 'item';
      row.innerHTML = `<div class="info">
          <div class="nm">${u.nm} <span class="lv">nv ${lvl}${maxed?' MAX':''}</span></div>
          <div class="ds">${u.ds(lvl)}</div>
        </div>`;
      const btn = document.createElement('button');
      btn.className = 'buy' + (maxed?' max':'');
      btn.textContent = maxed ? 'MAX' : '⚡ '+fmt(cost);
      btn.disabled = maxed || meta.volts < cost;
      btn.onclick = ()=>{
        if(meta.volts < cost || maxed) return;
        meta.volts -= cost; meta.up[k]++;
        blip(760,0.08,'square',0.12,1100);
        saveAll(); refreshTop(); renderShop(body);
      };
      row.appendChild(btn);
      body.appendChild(row);
    }
  }

  function renderAbil(body){
    body.innerHTML = '<div class="small">Habilidades ativas durante a corrida. Teclas 1 / 2 / 3 ou botões na tela.</div><hr class="hr">';
    for(const k in ABIL){
      const a = ABIL[k], lvl = meta.ab[k];
      const maxed = lvl>=a.max;
      const cost = abCost(k);
      const row = document.createElement('div');
      row.className = 'item';
      row.innerHTML = `<div class="info">
          <div class="nm">[${a.key}] ${a.nm} <span class="lv">${lvl===0?'BLOQUEADA':'nv '+lvl}${maxed?' MAX':''}</span></div>
          <div class="ds">${a.ds(lvl)}</div>
        </div>`;
      const btn = document.createElement('button');
      btn.className = 'buy' + (maxed?' max':'');
      btn.textContent = maxed ? 'MAX' : (lvl===0?'LIBERAR ':'') + '⚡ ' + fmt(cost);
      btn.disabled = maxed || meta.volts < cost;
      btn.onclick = ()=>{
        if(meta.volts < cost || maxed) return;
        meta.volts -= cost; meta.ab[k]++;
        blip(880,0.1,'square',0.13,1300);
        toast(lvl===0 ? a.nm+' liberado!' : a.nm+' melhorado');
        saveAll(); refreshTop(); renderAbil(body); uiMode();
      };
      row.appendChild(btn);
      body.appendChild(row);
    }
  }

  function renderPrest(body){
    const req = prestReq(), ok = meta.cycle >= req, gain = prestGain();
    body.innerHTML = `
      <h3 class="sec">OVERCLOCK — prestígio</h3>
      <div class="small">
        Reinicia volts, melhorias e habilidades em troca de <b style="color:var(--cyan)">CHIPS ▣</b>.<br>
        Cada chip dá <b style="color:var(--gold)">+10% em todos os ganhos de volts</b>, para sempre.<br><br>
        Chips atuais: <b style="color:var(--cyan)">${meta.chips}</b> (bônus x${chipBonus().toFixed(1)})<br>
        Overclocks feitos: ${meta.prestiges}<br>
        Volts acumulados neste ciclo: <b style="color:var(--gold)">${fmt(meta.cycle)}</b> / ${fmt(req)}<br>
        Chips ao overclockar agora: <b style="color:var(--cyan)">+${ok?gain:0}</b>
      </div>
      <hr class="hr">`;
    const btn = document.createElement('button');
    btn.className = 'buy';
    btn.style.width = '100%';
    btn.style.padding = '12px';
    if(!ok){
      btn.disabled = true;
      btn.textContent = 'ACUMULE ' + fmt(req) + ' VOLTS NO CICLO';
    } else {
      btn.textContent = prestConfirm ? 'CONFIRMAR? (apaga upgrades!)' : 'OVERCLOCK +' + gain + ' ▣';
      btn.onclick = ()=>{
        if(!prestConfirm){ prestConfirm = true; renderPrest(body); return; }
        meta.chips += gain;
        meta.prestiges++;
        meta.volts = 0; meta.cycle = 0;
        for(const k in meta.up) meta.up[k]=0;
        for(const k in meta.ab) meta.ab[k]=0;
        prestConfirm = false;
        blip(300,0.5,'sawtooth',0.15,1500);
        toast('OVERCLOCK! +' + gain + ' chips (bônus x' + chipBonus().toFixed(1) + ')');
        saveAll(); if(sb && sbUser){ clearTimeout(syncTimer); pushCloud(); }
        refreshTop(); renderPrest(body); uiMode();
      };
    }
    body.appendChild(btn);
  }

  function renderAcct(body){
    if(!sb){
      body.innerHTML = `
        <h3 class="sec">CONTA / NUVEM</h3>
        <div class="small">
          Supabase ainda não configurado — o progresso está sendo salvo <b>somente neste navegador</b> (localStorage).<br><br>
          Para ativar a conta na nuvem:<br>
          1. Crie um projeto em supabase.com<br>
          2. Rode o arquivo <b>supabase-setup.sql</b> no SQL Editor<br>
          3. Em Project Settings → API, copie a URL e a anon key<br>
          4. Cole nas constantes SUPABASE_URL e SUPABASE_ANON_KEY no topo do script do index.html<br><br>
          Detalhes no README.md.
        </div>`;
      return;
    }
    if(sbUser){
      body.innerHTML = `
        <h3 class="sec">CONTA</h3>
        <div class="small">
          Logado como <b style="color:var(--cyan)">${sbUser.email}</b><br>
          Última sincronização: ${lastSyncInfo}<br><br>
        </div>`;
      const sync = document.createElement('button');
      sync.className='buy'; sync.textContent='SINCRONIZAR AGORA'; sync.style.marginRight='8px';
      sync.onclick = async ()=>{ await pushCloud(); toast('salvo na nuvem'); renderAcct(body); };
      const out = document.createElement('button');
      out.className='buy'; out.textContent='SAIR';
      out.onclick = async ()=>{ await pushCloud(); await sb.auth.signOut(); sbUser=null; toast('desconectado'); renderAcct(body); };
      body.appendChild(sync); body.appendChild(out);
      return;
    }
    body.innerHTML = `
      <h3 class="sec">ENTRAR / CRIAR CONTA</h3>
      <div class="small" style="margin-bottom:8px">Salve seu progresso na nuvem e continue em qualquer dispositivo.</div>
      <input class="inp" id="fEmail" type="email" placeholder="email" autocomplete="email">
      <input class="inp" id="fPass" type="password" placeholder="senha (mín. 6)" autocomplete="current-password">
      <div id="fMsg" class="small" style="color:var(--magenta);margin-bottom:6px"></div>`;
    const login = document.createElement('button');
    login.className='buy'; login.textContent='ENTRAR'; login.style.marginRight='8px';
    const signup = document.createElement('button');
    signup.className='buy'; signup.textContent='CRIAR CONTA';
    const msg = ()=>body.querySelector('#fMsg');
    const creds = ()=>({ email: body.querySelector('#fEmail').value.trim(), password: body.querySelector('#fPass').value });
    login.onclick = async ()=>{
      msg().textContent = 'entrando...';
      const { data, error } = await sb.auth.signInWithPassword(creds());
      if(error){ msg().textContent = 'erro: ' + error.message; return; }
      sbUser = data.user;
      toast('logado!'); await pullCloud(); renderAcct(body); refreshTop();
    };
    signup.onclick = async ()=>{
      msg().textContent = 'criando conta...';
      const { data, error } = await sb.auth.signUp(creds());
      if(error){ msg().textContent = 'erro: ' + error.message; return; }
      if(data.session){ sbUser = data.user; toast('conta criada!'); await pullCloud(); renderAcct(body); }
      else { msg().textContent = 'confirme o email enviado e depois faça login.'; }
    };
    body.appendChild(login); body.appendChild(signup);
  }

  // gerador passivo (1x por segundo, sempre que a página está aberta)
  setInterval(()=>{
    if(meta.up.gen>0){
      gainVolts(meta.up.gen * chipBonus());
      if(modalOpen && curTab==='shop') renderTab();
    }
    saveLocal();
  }, 1000);

  // autosave nuvem periódico
  setInterval(()=>{ if(sb && sbUser) pushCloud(); }, 30000);
  window.addEventListener('beforeunload', ()=>{ saveLocal(); });

  // =====================================================================
  //  LOOP
  // =====================================================================
  let last = performance.now();
  function frame(t){
    let dt = (t-last)/1000; last = t;
    if(dt>0.05) dt=0.05;
    update(dt);
    render(t);
    if(uiDirty){ refreshTop(); uiDirty=false; }
    refreshAbilBar();
    requestAnimationFrame(frame);
  }

  function boot(){
    loadLocal();
    offlineGains();
    initStars();
    reset();
    state = MENU;
    uiMode(); refreshTop();
    authInit();
    requestAnimationFrame(frame);
  }
  if(document.fonts && document.fonts.ready){
    Promise.race([document.fonts.ready, new Promise(r=>setTimeout(r,800))]).then(boot);
  } else boot();
})();
</script>
</body>
</html>
